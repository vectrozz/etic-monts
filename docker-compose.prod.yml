# =============================================================================
# ETICMONT – Production docker-compose
# =============================================================================
# Usage:  docker compose -f docker-compose.prod.yml up -d --build
#
# IMPORTANT: The postgres-data volume is NEVER recreated or deleted.
#            Deploying a new version only rebuilds the app and nginx containers.
# =============================================================================

name: eticmonts

services:

  # ---------------------------------------------------------------------------
  # Flask application served by Gunicorn
  # ---------------------------------------------------------------------------
  app-flask:
    build:
      context: ./
      dockerfile: Dockerfile.prod
    env_file: .env
    environment:
      - FLASK_ENV=production
    networks:
      - front-db
    expose:
      - "8000"
    depends_on:
      postgres-db:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Nginx reverse proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-80}:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/usr/share/nginx/html/static:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app-flask
    networks:
      - front-db
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PostgreSQL – data volume is PRESERVED across deploys
  # ---------------------------------------------------------------------------
  postgres-db:
    image: postgres:17
    env_file: .env
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - "${BACKUP_DIR:-/home/postgres-backups}:/backups"
    networks:
      - front-db
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

# -----------------------------------------------------------------------------
# Named volume – survives `docker compose down` (only removed with -v flag)
# -----------------------------------------------------------------------------
volumes:
  postgres-data:

networks:
  front-db:
