{% extends "base.html" %}
{% block title %}Inscription — {{ branding.name or "Etic'Monts" }}{% endblock %}

{% block auth_content %}
<div class="auth-card">
    <div class="auth-brand">
        <h1>{{ branding.name or "Etic'Monts" }}</h1>
        <p>Créer un compte producteur</p>
    </div>
    <form action="{{ url_for('main.register') }}" method="POST">
        <div class="form-group">
            <label for="name">Identifiant</label>
            <input type="text" id="name" name="name" required autocomplete="username">
        </div>
        <div class="form-group">
            <label for="userpass">Mot de passe</label>
            <input type="password" id="userpass" name="userpass" required autocomplete="new-password" minlength="8">
        </div>
        <div class="form-group">
            <label for="userpass1">Confirmer le mot de passe</label>
            <input type="password" id="userpass1" name="userpass1" required autocomplete="new-password" minlength="8">
        </div>
        <div class="form-group">
            <label for="farmname">Nom de la ferme</label>
            <input type="text" id="farmname" name="farmname">
        </div>
        <div class="form-group">
            <label for="adress">Commune de la ferme</label>
            <input type="text" id="adress" name="adress">
        </div>
        <div class="form-group">
            <label for="integration_year">Membre depuis</label>
            <input type="number" min="2010" max="2100" step="1" id="integration_year" name="integration_year" placeholder="2025">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Créer le compte</button>
    </form>
    <p class="auth-switch">Déjà un compte ? <a href="{{ url_for('main.login') }}">Se connecter</a></p>
</div>
{% endblock %}
